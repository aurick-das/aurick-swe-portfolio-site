# PR + push to main: push populates GitHub checks on the default branch so Vercel
# deployment checks can discover required job names. E2E/Lighthouse skip when paths
# do not match filters (saves time); workflow_dispatch runs the full pipeline.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    # Included to allow Vercel to discover the job names.
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      deps: ${{ steps.filter.outputs.deps }}
      tests: ${{ steps.filter.outputs.tests }}
      lighthouse_ci: ${{ steps.filter.outputs.lighthouse_ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'components/**'
              - 'data/**'
              - 'posts/**'
              - 'lib/**'
              - 'public/**'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'middleware.ts'
              - 'instrumentation.ts'
            deps:
              - 'package.json'
              - 'package-lock.json'
            tests:
              - 'e2e/**'
              - '**/*.test.*'
              - '**/*.spec.*'
              - 'vitest.config.*'
              - 'vitest.setup.ts'
              - 'playwright.config.*'
            lighthouse_ci:
              - 'lighthouserc*.json'
              - 'scripts/run-lighthouse.mjs'

  quality-and-tests:
    name: Quality + Unit + Component
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Vitest: when CI is set, vitest.config.ts uses verbose + github-actions reporters
      # and sequential test files so logs show failing suite/test and file paths clearly.
      - name: Unit tests
        run: npm run test:unit

      - name: Component tests
        run: npm run test:component

  build:
    name: Build (Next.js)
    needs: [changes, quality-and-tests]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.deps == 'true' ||
      needs.changes.outputs.tests == 'true' ||
      needs.changes.outputs.lighthouse_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cache build output
        uses: actions/cache/save@v5
        with:
          path: .next
          key: build-${{ github.sha }}

  e2e:
    name: E2E (Playwright)
    needs: [changes, build]
    # Runs only when path filters match; if `build` was skipped (no matching paths), this job is skipped via `needs`.
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.tests == 'true' ||
      needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: build-${{ github.sha }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse
    needs: [changes, build]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.deps == 'true' ||
      needs.changes.outputs.lighthouse_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: build-${{ github.sha }}

      - name: Run Lighthouse assertions (desktop + mobile)
        run: npm run test:lighthouse

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouseci
          path: .lighthouseci
          include-hidden-files: true
          if-no-files-found: ignore
