name: CI

on:
  pull_request:
    branches: [main]
  # Branch Protection enabled: PRs required, status checks required 
  # push:
  #   branches: [main]
  workflow_dispatch:  

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

jobs:
  quality-and-tests:
    name: Quality + Unit + Component
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Vitest: when CI is set, vitest.config.ts uses verbose + github-actions reporters
      # and sequential test files so logs show failing suite/test and file paths clearly.
      - name: Unit tests
        run: npm run test:unit

      - name: Component tests
        run: npm run test:component

      - name: Build
        run: npm run build

      # Cache the build output for downstream jobs
      - name: Cache build output
        uses: actions/cache/save@v5
        with:
          path: .next
          key: build-${{ github.sha }}

  e2e:
    name: E2E (Playwright)
    needs: quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: build-${{ github.sha }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse
    needs: quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24  
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: .next
          key: build-${{ github.sha }}

      - name: Run Lighthouse assertions (desktop + mobile)
        run: npm run test:lighthouse

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouseci
          path: .lighthouseci
          include-hidden-files: true
          if-no-files-found: ignore
